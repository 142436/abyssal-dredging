<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abyssal Dredging</title>
    <style>
        /* === FONTS & RESET === */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Share+Tech+Mono&family=Teko:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            --bg-deep: #010306;
            --bg-mid: #050a10;
            --bg-rust: #38241b;
            --bg-rust-dark: #120c0a;
            
            --text-main: #d1c5b4;
            --text-dim: #7a7065;
            --text-alert: #d95129;
            --text-dev: #3bc453;
            
            --panel-border: #3b2e26;
            --panel-bg: linear-gradient(135deg, #14100e 0%, #0a0807 100%);
            --button-rust: linear-gradient(to bottom, #7a3214, #361405);
            --button-rust-hover: linear-gradient(to bottom, #943d1a, #4a1c09);
            
            --rarity-common: #8c929c;
            --rarity-uncommon: #4b8f51;
            --rarity-rare: #3b74b8;
            --rarity-epic: #8a3bb8;
            --rarity-legendary: #d69f36;
            --rarity-mythic: #d63636;
            --rarity-eldritch: #27c4b5;
            --rarity-unfathomable: #ffffff;
            --rarity-absolute: #ff0055; /* The Ultimate Tier */
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Teko', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: filter 0.5s ease, background-color 0.5s ease;
        }

        /* === INITIAL BOOT SCREEN (To Unlock Audio Context) === */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 1s ease;
        }
        #boot-text {
            font-family: 'Share Tech Mono', monospace; font-size: 1.5rem;
            color: var(--text-alert); text-transform: uppercase; letter-spacing: 4px;
            animation: pulseGlow 1.5s infinite alternate;
        }
        @keyframes pulseGlow { 0% { opacity: 0.4; } 100% { opacity: 1; text-shadow: 0 0 10px var(--text-alert); } }

        /* === STORM ALERT OVERLAY === */
        #storm-alert {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            font-family: 'Share Tech Mono', monospace; font-size: 1.2rem;
            color: #fff; text-shadow: 0 0 10px #00aaff, 0 0 20px #00aaff;
            background: rgba(0, 30, 50, 0.8); border: 1px solid #00aaff;
            padding: 5px 15px; border-radius: 4px; pointer-events: none;
            opacity: 0; z-index: 10; transition: opacity 0.5s ease;
        }
        #storm-alert.active {
            opacity: 1; animation: stormAlertPulse 1.5s infinite alternate;
        }
        @keyframes stormAlertPulse { 
            0% { box-shadow: 0 0 5px #00aaff; opacity: 0.8; } 
            100% { box-shadow: 0 0 20px #00aaff, inset 0 0 10px #00aaff; opacity: 1; text-shadow: 0 0 20px #00aaff, 0 0 40px #fff; } 
        }

        /* === ITEM-SPECIFIC CUSTOM CUTSCENES === */
        #corrupted-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; pointer-events: none; opacity: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease; overflow: hidden; perspective: 1000px; 
        }

        #corrupted-overlay.active { opacity: 1; pointer-events: all; cursor: none; }
        #corrupted-shapes { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 1; }
        #corrupted-text { position: relative; z-index: 2; font-family: 'Cinzel Decorative', serif; font-size: 4.5rem; color: transparent; text-align: center; padding: 0 20px; }

        /* 1. The Heart of the Trench (Mythic) */
        #corrupted-overlay.the-heart-of-the-trench { background: radial-gradient(circle, #2a0000 0%, #000 80%); }
        #corrupted-overlay.the-heart-of-the-trench #corrupted-shapes { background: repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 40px, rgba(255, 0, 0, 0.15) 41px, rgba(255, 0, 0, 0.4) 50px, transparent 51px); animation: pulseRings 1.2s infinite linear; }
        @keyframes pulseRings { 0% { transform: scale(0.8); opacity: 0.5; } 50% { opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        #corrupted-overlay.the-heart-of-the-trench #corrupted-text { animation: heartThump 1.2s infinite; color: #ff3333; text-shadow: 0 0 30px #ff0000, 0 0 10px #ff0000; }
        @keyframes heartThump { 0%, 100% { transform: scale(1); opacity: 0.8; } 10% { transform: scale(1.15); opacity: 1; filter: brightness(1.5); } 25% { transform: scale(1.05); opacity: 0.9; } 35% { transform: scale(1.2); opacity: 1; filter: brightness(2); } }

        /* 2. Cursed Figurehead (Mythic) */
        #corrupted-overlay.cursed-figurehead { background: linear-gradient(to bottom, #001a11, #000905); }
        #corrupted-overlay.cursed-figurehead #corrupted-shapes { background: repeating-linear-gradient(45deg, rgba(0, 255, 150, 0.05) 0px, transparent 40px, rgba(0, 200, 100, 0.05) 80px), repeating-linear-gradient(-45deg, rgba(0, 200, 150, 0.05) 0px, transparent 50px, rgba(0, 255, 100, 0.05) 100px); background-size: 200% 200%; animation: fogDrift 8s infinite linear; }
        @keyframes fogDrift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }
        #corrupted-overlay.cursed-figurehead #corrupted-text { animation: ghostlySway 5s ease-in-out infinite; color: #88ccaa; text-shadow: 0 0 20px #448866, 0 5px 5px #000; letter-spacing: 5px; }
        @keyframes ghostlySway { 0%, 100% { transform: rotate(-3deg) translateY(0); filter: blur(1px); } 50% { transform: rotate(3deg) translateY(-15px); filter: blur(4px); } }

        /* 3. Phantom Lighthouse (Mythic) */
        #corrupted-overlay.phantom-lighthouse { background: #000508; }
        #corrupted-overlay.phantom-lighthouse #corrupted-shapes { background: conic-gradient(from 180deg at 50% 120%, transparent 0deg, rgba(255, 255, 100, 0.4) 30deg, transparent 60deg); transform-origin: 50% 120%; animation: lighthouseSweep 6s infinite ease-in-out alternate; mix-blend-mode: screen; }
        @keyframes lighthouseSweep { 0% { transform: rotate(-50deg); } 100% { transform: rotate(50deg); } }
        #corrupted-overlay.phantom-lighthouse #corrupted-text { background: linear-gradient(90deg, #222 0%, #fff 50%, #222 100%); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: textBeam 6s infinite ease-in-out alternate; filter: drop-shadow(0 0 15px rgba(255,255,150,0.5)); }
        @keyframes textBeam { 0% { background-position: 100% 0; } 100% { background-position: 0% 0; } }

        /* 4. The Drowned Crown (Eldritch) */
        #corrupted-overlay.the-drowned-crown { background: radial-gradient(circle at center, #004455 0%, #000b1a 100%); }
        #corrupted-overlay.the-drowned-crown #corrupted-shapes { background-image: radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.6) 0%, transparent 4%), radial-gradient(circle at 80% 90%, rgba(255, 215, 0, 0.8) 0%, transparent 3%), radial-gradient(circle at 40% 60%, rgba(255, 215, 0, 0.4) 0%, transparent 5%), radial-gradient(circle at 60% 70%, rgba(255, 215, 0, 0.6) 0%, transparent 4%), radial-gradient(circle at 50% 40%, rgba(255, 215, 0, 0.9) 0%, transparent 12%); animation: bubblesRise 7s ease-in forwards; }
        @keyframes bubblesRise { 0% { transform: translateY(100px) scale(0.8); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-150px) scale(1.5); opacity: 0; } }
        #corrupted-overlay.the-drowned-crown #corrupted-text { animation: sinkingCrown 7s ease-in forwards; color: #ffd700; text-shadow: 0 0 40px #b8860b, 0 0 10px #ffea00, 0 0 50px #000; letter-spacing: 2px; }
        @keyframes sinkingCrown { 0% { transform: translateY(-80px); opacity: 0; filter: blur(10px); } 20% { opacity: 1; filter: blur(0px); } 80% { opacity: 1; filter: blur(0px); } 100% { transform: translateY(80px); opacity: 0; filter: blur(5px); } }

        /* 5. Whispering Obelisk (Eldritch) */
        #corrupted-overlay.whispering-obelisk { background: #0a001a; }
        #corrupted-overlay.whispering-obelisk #corrupted-shapes { background-image: linear-gradient(rgba(0, 255, 255, 0.3) 2px, transparent 2px), linear-gradient(90deg, rgba(255, 0, 255, 0.3) 2px, transparent 2px); background-size: 60px 60px; transform: perspective(600px) rotateX(60deg) translateY(-50px) translateZ(-200px); animation: gridMove 2s infinite linear; }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 60px; } }
        #corrupted-overlay.whispering-obelisk #corrupted-text { animation: obeliskGlitch 0.15s infinite; color: #aa00ff; text-shadow: -4px 0 #00ffff, 4px 0 #ff00ff; font-family: 'Share Tech Mono', monospace; font-size: 3.5rem; font-weight: bold; }
        @keyframes obeliskGlitch { 0% { transform: translate(3px, -3px) skew(-5deg); } 33% { transform: translate(-3px, 2px) skew(5deg); } 66% { transform: translate(2px, 3px) skew(0deg); } 100% { transform: translate(-2px, -2px) skew(-2deg); } }

        /* 6. Abyssal Leviathan Spine (Eldritch) */
        #corrupted-overlay.abyssal-leviathan-spine { background: radial-gradient(circle, #001a14 0%, #000 80%); }
        #corrupted-overlay.abyssal-leviathan-spine #corrupted-shapes { background: radial-gradient(ellipse at 50% -50%, transparent 60%, rgba(0, 255, 150, 0.15) 65%, transparent 70%), radial-gradient(ellipse at 50% 150%, transparent 60%, rgba(0, 255, 150, 0.15) 65%, transparent 70%); background-size: 300px 100%; animation: spinePass 4s infinite linear; }
        @keyframes spinePass { 0% { background-position: 0 0; } 100% { background-position: -300px 0; } }
        #corrupted-overlay.abyssal-leviathan-spine #corrupted-text { color: #ccffee; text-shadow: 0 0 20px #00ffaa, 0 10px 10px #000; animation: leviathanBreath 6s ease-in-out infinite; letter-spacing: 8px; }
        @keyframes leviathanBreath { 0%, 100% { transform: scale(1) translateY(0); filter: blur(3px); opacity: 0.6; } 50% { transform: scale(1.1) translateY(-5px); filter: blur(0px); opacity: 1; } }

        /* 7. Tear of the Abyss (Unfathomable) */
        #corrupted-overlay.tear-of-the-abyss { animation: tearFlashbangBg 10s forwards ease-out; }
        @keyframes tearFlashbangBg { 0%, 15% { background: #ffffff; } 40% { background: radial-gradient(circle, #fff 0%, #0044aa 50%, #000 100%); } 100% { background: #000411; } }
        #corrupted-overlay.tear-of-the-abyss #corrupted-shapes { background: radial-gradient(3px 3px at 20% 30%, #ffffff 50%, rgba(0,0,0,0)), radial-gradient(4px 4px at 40% 70%, #ffffff 50%, rgba(0,0,0,0)), radial-gradient(2px 2px at 60% 20%, #ffffff 50%, rgba(0,0,0,0)), radial-gradient(5px 5px at 80% 80%, #ffffff 50%, rgba(0,0,0,0)), radial-gradient(3px 3px at 10% 90%, #ffffff 50%, rgba(0,0,0,0)), radial-gradient(4px 4px at 90% 10%, #ffffff 50%, rgba(0,0,0,0)); background-size: 200px 200px; animation: starryVortex 10s linear forwards; opacity: 0; }
        @keyframes starryVortex { 0%, 20% { opacity: 0; transform: scale(0.1) rotate(0deg); } 50% { opacity: 1; } 100% { opacity: 0.5; transform: scale(4) rotate(180deg); } }
        #corrupted-overlay.tear-of-the-abyss #corrupted-text { animation: tearText 10s forwards; color: #fff; text-shadow: 0 0 50px #00aaff, 0 0 100px #fff; }
        @keyframes tearText { 0% { opacity: 0; transform: scale(0.3); letter-spacing: -10px; filter: blur(20px); } 20% { opacity: 1; transform: scale(1); letter-spacing: 5px; filter: blur(0px); } 80% { opacity: 1; transform: scale(1.1); letter-spacing: 20px; filter: blur(0px); } 100% { opacity: 0; transform: scale(1.5); letter-spacing: 45px; filter: blur(15px); } }

        /* 8. The Sunken Moon (Unfathomable) */
        #corrupted-overlay.the-sunken-moon { background: #000511; animation: deepSeaEclipse 11s forwards; }
        @keyframes deepSeaEclipse { 0% { background: #000; } 50% { background: radial-gradient(circle at bottom, #002244 0%, #000 70%); } 100% { background: #fff; } }
        #corrupted-overlay.the-sunken-moon #corrupted-shapes { background: radial-gradient(circle, #ffffee 0%, #ffffaa 20%, transparent 60%); border-radius: 50%; width: 200vw; height: 200vw; position: absolute; left: -50vw; top: 100vh; animation: lunarRise 11s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; box-shadow: 0 0 200px 100px rgba(255,255,200,0.8); mix-blend-mode: screen; }
        @keyframes lunarRise { 0% { transform: translateY(0); opacity: 0; } 30% { opacity: 1; } 100% { transform: translateY(-150vh); opacity: 1; } }
        #corrupted-overlay.the-sunken-moon #corrupted-text { color: #000; text-shadow: 0 0 20px #fff, 0 0 40px #ffffaa, 0 0 80px #ffcc00; animation: moonText 11s ease-in-out forwards; mix-blend-mode: overlay; z-index: 3; }
        @keyframes moonText { 0% { opacity: 0; transform: scale(0.8); letter-spacing: -5px; } 30% { opacity: 1; transform: scale(1); letter-spacing: 5px; } 80% { opacity: 1; transform: scale(1.1); letter-spacing: 15px; color: #fff; } 100% { opacity: 0; transform: scale(1.5); letter-spacing: 30px; filter: blur(10px); } }

        /* 9. Echo of the Genesis (Unfathomable) */
        #corrupted-overlay.echo-of-the-genesis { background: #000; }
        #corrupted-overlay.echo-of-the-genesis #corrupted-shapes { background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,255,255,0.8) 40px, rgba(0,255,255,0.8) 45px), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,0,255,0.8) 40px, rgba(255,0,255,0.8) 45px); width: 300vw; height: 300vh; position: absolute; left: -100vw; top: -100vh; transform-origin: center; animation: genesisHyperDrive 9s cubic-bezier(0.1, 0.7, 0.1, 1) forwards; opacity: 0; }
        @keyframes genesisHyperDrive { 0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(0.1); opacity: 0; filter: hue-rotate(0deg); } 10% { opacity: 1; } 90% { transform: rotateX(60deg) rotateY(20deg) rotateZ(180deg) scale(5); opacity: 1; filter: hue-rotate(360deg); } 100% { transform: rotateX(90deg) rotateY(45deg) rotateZ(360deg) scale(10); opacity: 0; filter: hue-rotate(720deg); } }
        #corrupted-overlay.echo-of-the-genesis #corrupted-text { font-family: 'Share Tech Mono', monospace; font-size: 5rem; color: #fff; animation: genesisText 9s forwards, textJitter 0.05s infinite; }
        @keyframes genesisText { 0% { opacity: 0; transform: scale(0.1); text-shadow: none; letter-spacing: -20px; } 20% { opacity: 1; transform: scale(1); text-shadow: -10px 0 20px #f0f, 10px 0 20px #0ff; letter-spacing: 0px; } 80% { opacity: 1; transform: scale(1.5); text-shadow: -30px 0 50px #f0f, 30px 0 50px #0ff; letter-spacing: 20px; } 100% { opacity: 0; transform: scale(3); text-shadow: -100px 0 100px #f0f, 100px 0 100px #0ff; letter-spacing: 50px; filter: blur(10px); } }

        /* 10. THE DEPTH ITSELF (ABSOLUTE TIER) - 18 SECOND EPIC CUTSCENE */
        #corrupted-overlay.the-depth-itself { animation: absoluteBg 18s forwards; }
        @keyframes absoluteBg {
            0%, 48% { background: #000000; }
            49% { background: #050011; }
            50%, 52% { background: #ffffff; } /* The Flashbang */
            55% { background: radial-gradient(circle at center, #003366 0%, #000 80%); } /* Breathing Cosmos */
            75% { background: radial-gradient(circle at center, #330033 0%, #000 90%); }
            100% { background: radial-gradient(circle at center, #00020a 0%, #000 100%); }
        }
        
        /* Layer 1: The Black Hole / Singularity Implosion */
        #corrupted-overlay.the-depth-itself #corrupted-shapes {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 20px 5px #ff0055, 0 0 50px 15px #00ffff;
            animation: absoluteSingularity 18s forwards cubic-bezier(0.4, 0, 1, 1);
            z-index: 1;
        }
        @keyframes absoluteSingularity {
            0% { width: 0px; height: 0px; opacity: 0; }
            5% { width: 2px; height: 2px; opacity: 1; }
            45% { width: 15px; height: 15px; box-shadow: 0 0 100px 40px #ff0055, 0 0 200px 80px #00ffff; filter: brightness(1); }
            49% { width: 0px; height: 0px; box-shadow: 0 0 500px 500px #fff; filter: brightness(5); } /* Implosion */
            50%, 100% { width: 0px; height: 0px; opacity: 0; box-shadow: none; }
        }

        /* Layer 1.5: Divine Ascension Particles */
        #corrupted-overlay.the-depth-itself::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,1) 0%, transparent 2%),
                radial-gradient(circle at 30% 70%, rgba(0,255,255,1) 0%, transparent 3%),
                radial-gradient(circle at 70% 30%, rgba(255,0,85,1) 0%, transparent 2%),
                radial-gradient(circle at 20% 40%, rgba(255,255,255,1) 0%, transparent 3%),
                radial-gradient(circle at 80% 80%, rgba(0,255,255,1) 0%, transparent 2%);
            background-size: 150px 150px;
            animation: absoluteAscension 18s forwards linear;
            z-index: 2; pointer-events: none; opacity: 0;
            mix-blend-mode: screen;
        }
        @keyframes absoluteAscension {
            0%, 49% { opacity: 0; transform: translateY(100vh) scale(0.5); }
            51% { opacity: 1; transform: translateY(50vh) scale(1.5); }
            100% { opacity: 0; transform: translateY(-100vh) scale(3); }
        }

        /* Layer 2: The Divine Light Rays (Post-Bang) */
        #corrupted-overlay.the-depth-itself::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg at 50% -10%, transparent 0deg, rgba(0, 255, 255, 0.05) 5deg, transparent 10deg, rgba(255, 0, 255, 0.05) 15deg, transparent 20deg);
            animation: divineRays 18s forwards;
            z-index: 2;
            pointer-events: none;
        }
        @keyframes divineRays {
            0%, 50% { opacity: 0; transform: scale(1) rotate(-5deg); }
            52% { opacity: 1; transform: scale(1.5) rotate(0deg); filter: brightness(2); }
            100% { opacity: 0.5; transform: scale(2.5) rotate(15deg); filter: brightness(1); }
        }

        /* Layer 3: The Majestic Levitating Text */
        #corrupted-overlay.the-depth-itself #corrupted-text {
            font-family: 'Share Tech Mono', monospace; font-size: 5rem; color: #ffffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #ff0055, 0 0 80px #fff;
            animation: absoluteText 18s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 3;
            white-space: nowrap;
        }
        @keyframes absoluteText {
            0%, 49% { opacity: 0; transform: scale(0.5) translateY(0); letter-spacing: -20px; }
            51% { opacity: 1; transform: scale(2.5) translateY(0); letter-spacing: 50px; filter: blur(20px) brightness(5); color: #fff; } 
            60% { opacity: 1; transform: scale(1.1) translateY(-10px); letter-spacing: 10px; filter: blur(0px) brightness(2); color: #ffffff; text-shadow: 0 0 50px #00ffff, 0 0 100px #ff0055, 0 0 150px #fff; }
            85% { opacity: 1; transform: scale(1.15) translateY(-30px); letter-spacing: 15px; filter: blur(0px) brightness(1.5); color: #ffffff; text-shadow: 0 0 30px #00ffff, 0 0 80px #ff0055, 0 0 120px #fff; }
            100% { opacity: 0; transform: scale(1.3) translateY(-60px); letter-spacing: 30px; filter: blur(20px); }
        }

        /* Environmental Mechanics */
        body.corrupted { background-color: #000; filter: grayscale(1) contrast(1.5) brightness(0.8); }
        body.corrupted .preserve-color { filter: grayscale(0) !important; }

        @keyframes screenShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-0.5deg); }
            20% { transform: translate(-3px, 0px) rotate(0.5deg); }
            30% { transform: translate(0px, -1px) rotate(0deg); }
            40% { transform: translate(2px, 1px) rotate(0.5deg); }
            50% { transform: translate(-1px, 2px) rotate(-0.5deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-0.5deg); }
            80% { transform: translate(-1px, -1px) rotate(0.5deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake { animation: screenShake 0.4s ease-out; }

        /* === TOP HALF: THE RIG === */
        #rig-section {
            flex: 0 0 35vh; position: relative; background: linear-gradient(to bottom, #03060a 0%, #010305 100%);
            border-bottom: 4px solid var(--panel-border); box-shadow: inset 0 -20px 50px rgba(0,0,0,0.9);
            display: flex; overflow: hidden;
        }

        #storm-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; opacity: 0.75; }
        .vignette { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.85) 100%); pointer-events: none; z-index: 4; }

        .fine-fog { position: absolute; top: 0; left: 0; width: 200%; height: 100%; background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.45"/></svg>'); mix-blend-mode: overlay; pointer-events: none; z-index: 4; }
        .fog-mist { position: absolute; top: 0; left: 0; width: 200%; height: 100%; background: linear-gradient(to right, transparent 0%, rgba(130, 160, 180, 0.25) 20%, transparent 40%, rgba(130, 160, 180, 0.4) 60%, transparent 80%); animation: driftMist 20s linear infinite; pointer-events: none; z-index: 4; }
        @keyframes driftMist { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* === WINCH VISUAL ASSEMBLY === */
        #winch-rig-assembly { position: absolute; left: 5%; bottom: 0; top: 0; width: 380px; z-index: 3; pointer-events: none; transition: transform 0.3s ease; }
        .winch-support-frame { position: absolute; bottom: 0; left: 20px; width: 140px; height: 100%; border-right: 8px solid #241913; border-left: 8px solid #1c130f; background: repeating-linear-gradient(45deg, #18110d, #18110d 15px, #241913 15px, #241913 30px); box-shadow: inset 0 0 10px #000, 5px 0 15px rgba(0,0,0,0.5); opacity: 0.9; }
        .winch-diagonal-brace { position: absolute; bottom: 0; left: 20px; width: 180px; height: 12px; background: #201611; border: 2px solid #140e0b; transform: rotate(-35deg); transform-origin: left bottom; }

<body>

    <!-- BOOT SCREEN TO ENABLE AUDIO -->
    <div id="boot-screen" onclick="bootSystem()">

            <button class="tab-btn" id="tab-btn-cargo" onclick="switchMobileTab('cargo')">Cargo Hold</button>
        </div>

            <div class="panel-title desktop-only">Winch Upgrade Matrix</div>
            <div id="upgrades-container"></div>
        </div>

    <script>
        // === PROCEDURAL AUDIO SYSTEM ===
        class AudioSystem {
            constructor() {
                this.ctx = null;
                this.masterGain = null;
                this.rainGain = null;
                this.isInitialized = false;
                this.baseRainVol = 0.4;
            }

            init() {
                if(this.isInitialized) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.5;
                this.masterGain.connect(this.ctx.destination);
                this.startRain();
                this.isInitialized = true;
            }

            startRain() {
                const bufferSize = this.ctx.sampleRate * 2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for(let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

                this.rainSource = this.ctx.createBufferSource();
                this.rainSource.buffer = buffer;
                this.rainSource.loop = true;

                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;

                this.rainGain = this.ctx.createGain();
                this.rainGain.gain.value = this.baseRainVol;

                this.rainSource.connect(filter);
                filter.connect(this.rainGain);
                this.rainGain.connect(this.masterGain);
                this.rainSource.start();
            }

            fadeRain(targetVol, transitionTime) {
                if(!this.rainGain || !this.ctx) return;
                this.rainGain.gain.setTargetAtTime(targetVol, this.ctx.currentTime, transitionTime);
            }

            setHeavyStormAudio(active) {
                if(!this.ctx || !this.rainGain) return;
                this.baseRainVol = active ? 0.9 : 0.4;
                if(typeof game !== 'undefined' && !game.isCutsceneActive) {
                    this.fadeRain(this.baseRainVol, 2);
                }
            }

            playThunder(intensity) {
                if(!this.ctx) return;
                if(typeof game !== 'undefined' && game.isCutsceneActive) return;

                const bufferSize = this.ctx.sampleRate * 4;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for(let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 150 + (intensity * 200);

                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(intensity * 1.5, this.ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 3);

                source.connect(filter); filter.connect(gain); gain.connect(this.masterGain);
                source.start(); source.stop(this.ctx.currentTime + 4);
            }

            playDredge(isAuto, durationMs) {
                if(!this.ctx) return;
                const vol = isAuto ? 0.04 : 0.15; 
                const duration = durationMs / 1000;
                const now = this.ctx.currentTime;
                
                const playHeavyClang = (time) => {
                    const bufferSize = this.ctx.sampleRate * 0.6;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    
                    const resonantFreqs = [220, 380, 650, 1100, 1800];
                    resonantFreqs.forEach((f, idx) => {
                        const noise = this.ctx.createBufferSource();
                        noise.buffer = buffer;
                        
                        const bp = this.ctx.createBiquadFilter();
                        bp.type = 'bandpass';
                        bp.frequency.value = f;
                        bp.Q.value = 25; 
                        
                        const gain = this.ctx.createGain();
                        gain.gain.setValueAtTime(0, time);
                        gain.gain.linearRampToValueAtTime((vol * 3.5) / resonantFreqs.length, time + 0.01);
                        
                        const decay = 0.5 - (idx * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.001, time + Math.max(0.1, decay));
                        
                        noise.connect(bp); bp.connect(gain); gain.connect(this.masterGain);
                        noise.start(time);
                    });

                    const crunch = this.ctx.createBufferSource();
                    crunch.buffer = buffer;
                    const lp = this.ctx.createBiquadFilter();
                    lp.type = 'lowpass';
                    lp.frequency.value = 300; 
                    
                    const lpGain = this.ctx.createGain();
                    lpGain.gain.setValueAtTime(0, time);
                    lpGain.gain.linearRampToValueAtTime(vol * 3.0, time + 0.02);
                    lpGain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
                    
                    crunch.connect(lp); lp.connect(lpGain); lpGain.connect(this.masterGain);
                    crunch.start(time);
                };
                
                const playGrind = (startTime, dur) => {
                    const bufferSize = this.ctx.sampleRate * dur;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    
                    const noise = this.ctx.createBufferSource();
                    noise.buffer = buffer;
                    
                    const bp = this.ctx.createBiquadFilter();
                    bp.type = 'bandpass';
                    bp.frequency.value = 180; 
                    bp.Q.value = 2;
                    
                    const lfo = this.ctx.createOscillator();
                    lfo.type = 'sawtooth';
                    lfo.frequency.value = 8; 
                    const lfoGain = this.ctx.createGain();
                    lfoGain.gain.value = 150;
                    lfo.connect(lfoGain); lfoGain.connect(bp.frequency);
                    lfo.start(startTime); lfo.stop(startTime + dur);
                    
                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(vol * 0.5, startTime + 0.1);
                    gain.gain.setValueAtTime(vol * 0.5, startTime + dur - 0.1);
                    gain.gain.linearRampToValueAtTime(0, startTime + dur);
                    
                    noise.connect(bp); bp.connect(gain); gain.connect(this.masterGain);
                    noise.start(startTime);
                };

                playHeavyClang(now); 
                playGrind(now, duration); 
                playHeavyClang(now + duration); 
            }

            playCutsceneDrone(tierId, durationMs) {
                if(!this.ctx) return;
                this.fadeRain(0.01, 1.0); 
                
                const dur = durationMs / 1000;
                const now = this.ctx.currentTime;
                let freqs = []; 
                
                // MASSIVE CINEMATIC REVERB BUS
                const echo = this.ctx.createDelay();
                echo.delayTime.value = 0.5; // 500ms massive cavern echo
                const echoFeedback = this.ctx.createGain();
                echoFeedback.gain.value = 0.6; // 60% echo tail
                const echoFilter = this.ctx.createBiquadFilter();
                echoFilter.type = 'lowpass';
                echoFilter.frequency.value = 1500;
                echo.connect(echoFilter); echoFilter.connect(echoFeedback); echoFeedback.connect(echo);
                echo.connect(this.masterGain);

                if(tierId === 'absolute') {
                    // PHASE 1: The Cosmic Siren & Void Vacuum (0s - 9s)
                    const siren = this.ctx.createOscillator();
                    siren.type = 'sawtooth';
                    siren.frequency.setValueAtTime(50, now);
                    siren.frequency.exponentialRampToValueAtTime(800, now + 8.8);
                    
                    const sirenLp = this.ctx.createBiquadFilter();
                    sirenLp.type = 'lowpass';
                    sirenLp.frequency.setValueAtTime(100, now);
                    sirenLp.frequency.exponentialRampToValueAtTime(3000, now + 8.8);
                    
                    const sirenGain = this.ctx.createGain();
                    sirenGain.gain.setValueAtTime(0, now);
                    sirenGain.gain.linearRampToValueAtTime(0.5, now + 8.5);
                    sirenGain.gain.exponentialRampToValueAtTime(0.001, now + 8.9);
                    
                    siren.connect(sirenLp); sirenLp.connect(sirenGain); sirenGain.connect(echo); sirenGain.connect(this.masterGain);
                    siren.start(now); siren.stop(now + 9.0);

                    // Vacuum wind
                    const wBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * 9, this.ctx.sampleRate);
                    const wData = wBuf.getChannelData(0);
                    for(let i=0; i<wData.length; i++) wData[i] = Math.random() * 2 - 1;
                    const wind = this.ctx.createBufferSource(); wind.buffer = wBuf;
                    const wFilt = this.ctx.createBiquadFilter(); wFilt.type = 'bandpass'; wFilt.Q.value = 5;
                    wFilt.frequency.setValueAtTime(200, now); wFilt.frequency.exponentialRampToValueAtTime(4000, now + 8.8);
                    const wGain = this.ctx.createGain(); wGain.gain.setValueAtTime(0, now); wGain.gain.linearRampToValueAtTime(1.5, now + 8.5); wGain.gain.exponentialRampToValueAtTime(0.001, now + 8.9);
                    wind.connect(wFilt); wFilt.connect(wGain); wGain.connect(echo); wGain.connect(this.masterGain);
                    wind.start(now);

                    // PHASE 2: The Sub Drop & Big Bang (9.0s)
                    const drop = this.ctx.createOscillator();
                    drop.type = 'sine';
                    drop.frequency.setValueAtTime(150, now + 8.5);
                    drop.frequency.exponentialRampToValueAtTime(10, now + 10.5);
                    const dropGain = this.ctx.createGain();
                    dropGain.gain.setValueAtTime(0, now + 8.4);
                    dropGain.gain.linearRampToValueAtTime(0.8, now + 8.5);
                    dropGain.gain.exponentialRampToValueAtTime(0.01, now + 12.0);
                    drop.connect(dropGain); dropGain.connect(this.masterGain);
                    drop.start(now + 8.5); drop.stop(now + 12.0);

                    const bangDur = 5;
                    const bBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * bangDur, this.ctx.sampleRate);
                    const bData = bBuf.getChannelData(0);
                    for(let i=0; i<bData.length; i++) bData[i] = Math.random() * 2 - 1;
                    const blast = this.ctx.createBufferSource(); blast.buffer = bBuf;
                    
                    const bFilt = this.ctx.createBiquadFilter(); bFilt.type = 'lowpass';
                    bFilt.frequency.setValueAtTime(2500, now + 9.0); bFilt.frequency.exponentialRampToValueAtTime(50, now + 9.0 + bangDur);
                    
                    const bGain = this.ctx.createGain(); bGain.gain.setValueAtTime(0, now + 8.9); bGain.gain.setValueAtTime(4.0, now + 9.0); bGain.gain.exponentialRampToValueAtTime(0.001, now + 9.0 + bangDur);
                    blast.connect(bFilt); bFilt.connect(bGain); bGain.connect(echo); bGain.connect(this.masterGain);
                    blast.start(now + 9.0);
                    
                    // PHASE 3: The Majestic Void Pad (9.1s - 18s) - Huge C Maj7 Lydian chord
                    freqs = [130.81, 164.81, 196.00, 261.63, 329.63, 392.00];
                    freqs.forEach((freq, idx) => {
                        for(let j=0; j<2; j++) {
                            const osc = this.ctx.createOscillator();
                            osc.type = j===0 ? 'sawtooth' : 'triangle';
                            osc.frequency.value = freq + ((Math.random() - 0.5) * 4); 
                            
                            const pLp = this.ctx.createBiquadFilter();
                            pLp.type = 'lowpass';
                            pLp.frequency.setValueAtTime(100, now + 9.1);
                            pLp.frequency.linearRampToValueAtTime(1200, now + 12);
                            pLp.frequency.linearRampToValueAtTime(200, now + 17);

                            const pGain = this.ctx.createGain();
                            pGain.gain.setValueAtTime(0, now + 9.0);
                            pGain.gain.linearRampToValueAtTime(0.15 / freqs.length, now + 10.5);
                            pGain.gain.setValueAtTime(0.15 / freqs.length, now + 15);
                            pGain.gain.linearRampToValueAtTime(0, now + dur);

                            osc.connect(pLp); pLp.connect(pGain); pGain.connect(echo); pGain.connect(this.masterGain);
                            osc.start(now + 9.1); osc.stop(now + dur);
                        }
                    });

                    // PHASE 4: Divine Shimmering Bells (Post-Bang Ascension)
                    const bellFreqs = [1046.50, 1318.51, 1567.98, 2093.00]; // C6, E6, G6, C7
                    bellFreqs.forEach((freq, idx) => {
                        const bell = this.ctx.createOscillator();
                        bell.type = 'sine';
                        bell.frequency.value = freq;
                        
                        const bGain = this.ctx.createGain();
                        const startTime = now + 9.5 + (idx * 0.4); // Stagger the bell chimes
                        
                        bGain.gain.setValueAtTime(0, now + 9.0);
                        bGain.gain.setValueAtTime(0, startTime);
                        bGain.gain.linearRampToValueAtTime(0.08, startTime + 0.1);
                        bGain.gain.exponentialRampToValueAtTime(0.001, startTime + 3.0);
                        
                        bell.connect(bGain); bGain.connect(echo); bGain.connect(this.masterGain);
                        bell.start(startTime); bell.stop(startTime + 3.5);
                    });
                    
                    setTimeout(() => { this.fadeRain(this.baseRainVol, 3); }, durationMs - 1500);
                    return; 
                }
                
                // Other Rarities (Uses the shared variable declared at the top)
                if(tierId === 'mythic') freqs = [130.81, 196.00, 261.63]; 
                else if(tierId === 'eldritch') freqs = [110.00, 164.81, 220.00]; 
                else if(tierId === 'unfathomable') freqs = [87.31, 130.81, 174.61, 261.63]; 
                
                freqs.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator();
                    osc.type = 'sine'; 
                    
                    const lfo = this.ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.1 + (idx * 0.05); 
                    const lfoGain = this.ctx.createGain();
                    lfoGain.gain.value = 3; 
                    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
                    lfo.start(now); lfo.stop(now + dur);
                    
                    osc.frequency.value = freq;
                    
                    const gain = this.ctx.createGain();
                    osc.connect(gain); 
                    gain.connect(echo); 
                    gain.connect(this.masterGain);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.6 / freqs.length, now + dur * 0.3); 
                    gain.gain.setValueAtTime(0.6 / freqs.length, now + dur * 0.7);
                    gain.gain.linearRampToValueAtTime(0, now + dur);
                    
                    osc.start(now); osc.stop(now + dur);
                });
                
                setTimeout(() => { this.fadeRain(this.baseRainVol, 3); }, durationMs - 1500);
            }
        }

        // === STORM BACKGROUND MANAGER ===
        class StormController {
            constructor() {
                this.canvas = document.getElementById('storm-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.lightningTimer = 0;
                this.lightningFlash = 0;
                this.isHeavyStorm = false;
                this.init();
            }
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                for (let i = 0; i < 80; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        length: Math.random() * 20 + 10,
                        speedX: -2 - Math.random() * 2,
                        speedY: Math.random() * 12 + 15,
                        opacity: Math.random() * 0.4 + 0.1
                    });
                }
                this.animate();
            }
            resize() {
                this.canvas.width = this.canvas.parentElement.clientWidth;
                this.canvas.height = this.canvas.parentElement.clientHeight;
            }
            setHeavyStorm(active) {
                this.isHeavyStorm = active;
                if (active) {
                    for (let i = 0; i < 150; i++) {
                        this.particles.push({
                            x: Math.random() * this.canvas.width,
                            y: Math.random() * this.canvas.height,
                            length: Math.random() * 30 + 15,
                            speedX: -4 - Math.random() * 4,
                            speedY: Math.random() * 20 + 20,
                            opacity: Math.random() * 0.6 + 0.2
                        });
                    }
                } else {
                    this.particles.splice(80);
                }
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.lightningTimer++;
                
                const lightningMax = this.isHeavyStorm ? 80 : 250;
                const lightningProb = this.isHeavyStorm ? 0.05 : 0.01;
                
                if (this.lightningTimer > lightningMax && Math.random() < lightningProb) {
                    this.lightningFlash = Math.random() > 0.5 ? 0.9 : 0.6;
                    this.lightningTimer = 0;
                    if(sfx.isInitialized) sfx.playThunder(this.lightningFlash);
                }
                if (this.lightningFlash > 0) {
                    this.ctx.fillStyle = `rgba(180, 210, 255, ${this.lightningFlash})`;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.lightningFlash -= 0.08;
                }
                this.ctx.strokeStyle = 'rgba(156, 180, 204, 0.45)';
                this.ctx.lineWidth = 1;
                this.particles.forEach(p => {
                    this.ctx.beginPath(); this.ctx.moveTo(p.x, p.y); this.ctx.lineTo(p.x + p.speedX, p.y + p.speedY); this.ctx.stroke();
                    p.x += p.speedX; p.y += p.speedY;
                    if (p.y > this.canvas.height) { p.y = -p.length; p.x = Math.random() * (this.canvas.width + 100); }
                    if (p.x < -p.length) { p.x = this.canvas.width + p.length; }
                });
                requestAnimationFrame(() => this.animate());
            }
        }

        // === CORE ENGINE INTERNALS ===
        class AbyssalDredging {
            constructor() {
                this.inventory = {};
                this.scrapCount = 0;
                this.upgrades = { winch: 0, lures: 0, capacity: 0 };
                this.isDredging = false;
                this.autoDredge = false;
                this.isCutsceneActive = false; 
                this.dredgeStartTime = 0;
                this.currentCooldown = 5000;
                this.animationFrameId = null;
                
                this.stormActive = false;
                this.stormTimeLeft = 0;
                this.stormTick = setInterval(() => this.gameTick(), 1000);

                this.loadGame();
                this.initUI();
                this.updateUI();
            }
            
            gameTick() {
                if (this.stormActive) {
                    this.stormTimeLeft--;
                    document.getElementById('storm-alert').innerText = `ABYSSAL STORM ACTIVE: LUCK x3 (${this.stormTimeLeft}s)`;
                    if (this.stormTimeLeft <= 0) this.endStorm();
                } else {
                    if (Math.random() < 0.006) {
                        this.startStorm();
                    }
                }
            }

            startStorm() {
                if(this.stormActive) return;
                this.stormActive = true;
                this.stormTimeLeft = 60; 
                
                document.getElementById('storm-alert').classList.add('active');
                document.getElementById('storm-alert').innerText = `ABYSSAL STORM ACTIVE: LUCK x3 (${this.stormTimeLeft}s)`;
                
                if (window.stormController) window.stormController.setHeavyStorm(true);
                if (sfx.isInitialized) sfx.setHeavyStormAudio(true);
                
                this.logEntry("WARNING: ABYSSAL STORM FRONT DETECTED. RARITY RATES SPIKING.", RARITIES.LEGENDARY);
            }

            endStorm() {
                this.stormActive = false;
                document.getElementById('storm-alert').classList.remove('active');
                
                if (window.stormController) window.stormController.setHeavyStorm(false);
                if (sfx.isInitialized) sfx.setHeavyStormAudio(false);
                
                this.logEntry("The abyssal storm has passed.", RARITIES.UNCOMMON);
            }

            saveGame() {
                localStorage.setItem('abyssalSave', JSON.stringify({ inventory: this.inventory, scrapCount: this.scrapCount, upgrades: this.upgrades }));
            }

            loadGame() {
                const saved = localStorage.getItem('abyssalSave');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        this.inventory = data.inventory || {};
                        this.upgrades = data.upgrades || { winch: 0, lures: 0, capacity: 0 };
                        this.recalcScrap();
                    } catch(e) { console.error("Save load failure", e); }
                }
            }

            recalcScrap() {
                let total = 0;
                for (let item of RARITIES.COMMON.items) { if (this.inventory[item]) total += this.inventory[item]; }
                this.scrapCount = total;
            }

            getUpgradeValue(id) {
                const def = UPGRADES_DEF[id];
                let val = def.baseValue + (def.valueChange * this.upgrades[id]);
                if (id === 'winch') val = Math.max(500, val);
                return val;
            }

            getUpgradeCost(id) { return Math.floor(UPGRADES_DEF[id].baseCost * Math.pow(UPGRADES_DEF[id].costMult, this.upgrades[id])); }

            buyUpgrade(id) {
                if (this.isCutsceneActive) return; 
                const cost = this.getUpgradeCost(id);
                if (this.scrapCount >= cost && this.upgrades[id] < UPGRADES_DEF[id].maxLevel) {
                    this.deductScrap(cost); this.upgrades[id]++; this.saveGame(); this.updateUI();
                    document.getElementById('rig-section').classList.add('shake');
                    setTimeout(() => document.getElementById('rig-section').classList.remove('shake'), 400);
                }
            }

            deductScrap(amount) {
                let rem = amount;
                for (let item of RARITIES.COMMON.items) {
                    if (rem <= 0) break;
                    if (this.inventory[item]) {
                        if (this.inventory[item] >= rem) { this.inventory[item] -= rem; rem = 0; }
                        else { rem -= this.inventory[item]; this.inventory[item] = 0; }
                        if (this.inventory[item] === 0) delete this.inventory[item];
                    }
                }
                this.recalcScrap();
            }

            crushItem(itemName, rarityId) {
                if (this.isCutsceneActive) return; 
                if (this.inventory[itemName] && this.inventory[itemName] > 0) {
                    this.inventory[itemName]--;
                    if (this.inventory[itemName] === 0) delete this.inventory[itemName];
                    this.inventory["Rusted Scrap"] = (this.inventory["Rusted Scrap"] || 0) + RARITIES[rarityId.toUpperCase()].crushYield;
                    this.recalcScrap(); this.saveGame(); this.updateUI();
                    const listEl = document.getElementById('inventory-list');
                    listEl.style.boxShadow = "inset 0 0 25px rgba(217, 81, 41, 0.4)";
                    setTimeout(() => listEl.style.boxShadow = "none", 250);
                }
            }

            toggleAutoDredge(isChecked) { 
                if (this.isCutsceneActive) return; 
                this.autoDredge = isChecked; 
                if (this.autoDredge && !this.isDredging) this.startDredge(); 
            }

            startDredge() {
                if (this.isDredging || this.isCutsceneActive) return; 
                this.isDredging = true;
                this.currentCooldown = this.getUpgradeValue('winch');
                this.dredgeStartTime = performance.now();
                
                if(sfx.isInitialized) {
                    sfx.playDredge(this.autoDredge, this.currentCooldown);
                }
                
                document.getElementById('dredge-button').classList.add('cooldown');
                document.getElementById('progress-text').innerText = "DISPATCHING NETS...";
                document.getElementById('winch-speed-display').innerText = "Dredging...";
                document.getElementById('winch-speed-display').style.color = "var(--text-alert)";
                
                document.getElementById('winch-drum-spool').className = "winch-wire-coils spool-descending";
                document.getElementById('winch-pulley-wheel').className = "winch-guide-pulley spool-descending";

                const cable = document.getElementById('winch-cable');
                cable.style.transition = `height ${this.currentCooldown / 2000}s ease-in-out`;
                cable.style.height = `120%`;

                document.getElementById('rig-section').classList.add('shake');
                setTimeout(() => document.getElementById('rig-section').classList.remove('shake'), 400);

                this.animationFrameId = requestAnimationFrame((t) => this.dredgeLoop(t));
            }

            dredgeLoop(timestamp) {
                const elapsed = timestamp - this.dredgeStartTime;
                const progress = Math.min(elapsed / this.currentCooldown, 1);
                document.getElementById('progress-bar').style.width = `${progress * 100}%`;
                
                if (progress < 0.5) {
                    document.getElementById('progress-text').innerText = `DESCENDING... (${(progress * 200).toFixed(0)}m)`;
                } else {
                    document.getElementById('progress-text').innerText = `WINCHING UP... (${((1 - progress) * 200).toFixed(0)}m)`;
                    document.getElementById('winch-drum-spool').className = "winch-wire-coils spool-ascending";
                    document.getElementById('winch-pulley-wheel').className = "winch-guide-pulley spool-ascending";
                    const cable = document.getElementById('winch-cable');
                    cable.style.transition = `height ${this.currentCooldown / 2000}s ease-in-out`;
                    cable.style.height = `30%`;
                }

                if (progress >= 1) this.finishDredge();
                else this.animationFrameId = requestAnimationFrame((t) => this.dredgeLoop(t));
            }

            finishDredge() {
                this.isDredging = false;
                document.getElementById('dredge-button').classList.remove('cooldown');
                document.getElementById('progress-bar').style.width = `0%`;
                document.getElementById('progress-text').innerText = "IDLE";
                document.getElementById('winch-speed-display').innerText = "Ready";
                document.getElementById('winch-speed-display').style.color = "var(--rarity-uncommon)";

                document.getElementById('winch-drum-spool').className = "winch-wire-coils";
                document.getElementById('winch-pulley-wheel').className = "winch-guide-pulley";

                document.getElementById('rig-section').classList.add('shake');
                setTimeout(() => document.getElementById('rig-section').classList.remove('shake'), 350);
                
                const capacity = this.getUpgradeValue('capacity');
                let luck = this.getUpgradeValue('lures');
                if (this.stormActive) luck *= 3; 
                
                const pulls = [];
                for(let i=0; i<capacity; i++) { pulls.push(this.rollRNG(luck)); }

                let triggeredEvent = null;
                pulls.forEach(pull => {
                    this.inventory[pull.item] = (this.inventory[pull.item] || 0) + 1;
                    this.logEntry(pull.item, pull.rarity);
                    
                    if (['ABSOLUTE', 'MYTHIC', 'ELDRITCH', 'UNFATHOMABLE'].includes(pull.rarityKey)) {
                        if (!triggeredEvent || pull.rarity.chance < triggeredEvent.rarity.chance) {
                            triggeredEvent = { item: pull.item, rarity: pull.rarity };
                        }
                    }
                });

                this.recalcScrap(); this.saveGame(); this.updateUI();

                if (triggeredEvent) {
                    this.triggerCutscene(triggeredEvent);
                } else {
                    if (this.autoDredge) {
                        setTimeout(() => { if (this.autoDredge && !this.isDredging && !this.isCutsceneActive) this.startDredge(); }, 300);
                    }
                }
            }

            rollRNG(luckMultiplier) {
                const roll = Math.random();
                for (let rarity of RARITY_ORDER) {
                    if (roll < (rarity.chance * luckMultiplier)) {
                        const item = rarity.items[Math.floor(Math.random() * rarity.items.length)];
                        return { item, rarity: rarity, rarityKey: Object.keys(RARITIES).find(k => RARITIES[k] === rarity) };
                    }
                }
                return { item: RARITIES.COMMON.items[Math.floor(Math.random() * RARITIES.COMMON.items.length)], rarity: RARITIES.COMMON, rarityKey: 'COMMON' };
            }

            triggerCutscene(eventData) {
                if (this.isCutsceneActive) return;
                this.isCutsceneActive = true;

                const body = document.body; 
                const overlay = document.getElementById('corrupted-overlay');
                const shapes = document.getElementById('corrupted-shapes');
                const text = document.getElementById('corrupted-text');
                
                const itemClass = eventData.item.toLowerCase().replace(/[^a-z0-9]/g, '-');
                
                overlay.className = ''; shapes.className = ''; text.className = '';
                void overlay.offsetWidth; 

                body.classList.add('corrupted'); 
                overlay.classList.add('active', itemClass);
                
                text.style.textShadow = eventData.rarity.shadow; 
                text.style.color = eventData.rarity.color;

                let messages = ["ANOMALY DETECTED"];
                let duration = 5000;

                switch(itemClass) {
                    case 'the-heart-of-the-trench': messages = ["THUMP...", "THUMP...", "THE ABYSS HAS A PULSE"]; duration = 6000; document.getElementById('rig-section').style.animation = "screenShake 0.4s infinite"; break;
                    case 'cursed-figurehead': messages = ["SHE WEEPS SALT WATER", "A CAPTAIN'S REGRET", "THE WOOD GROANS"]; duration = 5000; break;
                    case 'the-drowned-crown': messages = ["BOW TO THE TIDE", "HEAVY IS THE HEAD", "A KINGDOM OF SILT"]; duration = 7000; break;
                    case 'whispering-obelisk': messages = ["/// NON-EUCLIDEAN ERROR ///", "IT SPEAKS IN DEAD TONGUES", "GEOMETRY OF THE DEEP"]; duration = 6000; document.getElementById('rig-section').style.animation = "screenShake 0.1s infinite"; break;
                    case 'tear-of-the-abyss': messages = ["THE OCEAN WEEPS", "A FRACTURE IN REALITY", "SINGULARITY ACHIEVED"]; duration = 10000; document.getElementById('rig-section').style.animation = "screenShake 0.05s infinite"; break;
                    case 'the-sunken-moon': messages = ["IT ILLUMINATES THE DEEP", "A LIGHT IN THE DARKNESS", "THE TIDES OBEY"]; duration = 11000; break;
                    case 'echo-of-the-genesis': messages = ["SYSTEM ERROR: 0x000000", "NULL", "BEGINNING AND END"]; duration = 9000; document.getElementById('rig-section').style.animation = "screenShake 0.05s infinite"; break;
                    case 'abyssal-leviathan-spine': messages = ["THE GIANTS STILL ROAM", "A REMNANT OF THE ANCIENTS", "COLOSSAL DECAY"]; duration = 7000; document.getElementById('rig-section').style.animation = "screenShake 0.8s infinite"; break;
                    case 'phantom-lighthouse': messages = ["IT GUIDES THEM DOWN", "DO NOT FOLLOW THE LIGHT", "LOST AT SEA"]; duration = 6000; break;
                    case 'the-depth-itself': messages = ["I AM THE OCEAN", "THERE IS NO BOTTOM", "YOU HAVE REACHED THE END"]; duration = 18000; document.getElementById('rig-section').style.animation = "screenShake 0.1s infinite"; break;
                }

                if(sfx.isInitialized) {
                    sfx.playCutsceneDrone(eventData.rarity.id, duration);
                }

                text.innerText = messages[Math.floor(Math.random() * messages.length)];
                document.getElementById('log-container').classList.add('preserve-color');

                setTimeout(() => {
                    body.classList.remove('corrupted'); 
                    overlay.classList.remove('active');
                    document.getElementById('log-container').classList.remove('preserve-color');
                    document.getElementById('rig-section').style.animation = "";
                    this.isCutsceneActive = false; 

                    if (this.autoDredge && !this.isDredging) {
                        this.startDredge();
                    }
                }, duration);
            }

            formatCrushYield(amount) {
                if (amount >= 1000000) return (amount / 1000000).toFixed(0) + "M";
                if (amount >= 1000) return (amount / 1000).toFixed(0) + "K";
                return amount;
            }

            initUI() {
                const upCont = document.getElementById('upgrades-container');
                upCont.innerHTML = '';
                Object.values(UPGRADES_DEF).forEach(def => {
                    upCont.innerHTML += `
                        <div class="upgrade-card" id="card-${def.id}">
                            <div class="upgrade-header">
                                <span>${def.name} <span style="font-size: 0.8em; color: var(--text-dim)">Lvl <span id="lvl-${def.id}">0</span></span></span>
                            </div>
                            <div class="upgrade-desc">${def.desc}</div>
                            <div style="color: var(--text-alert); margin-top: 3px; font-size: 0.85rem; font-family: 'Share Tech Mono', monospace;">
                                Output: <span id="val-${def.id}"></span>
                            </div>
                            <div class="upgrade-action">
                                <span class="cost-text">Cost: <span id="cost-${def.id}">0</span> Scrap</span>
                                <button class="btn-upgrade" id="btn-up-${def.id}" onclick="game.buyUpgrade('${def.id}')">Assemble</button>
                            </div>
                        </div>
                    `;
                });
            }

            updateUI() {
                document.getElementById('currency-amount').innerText = this.scrapCount.toLocaleString();
                Object.keys(UPGRADES_DEF).forEach(id => {
                    const def = UPGRADES_DEF[id]; const level = this.upgrades[id]; const cost = this.getUpgradeCost(id);
                    document.getElementById(`lvl-${id}`).innerText = level;
                    document.getElementById(`val-${id}`).innerText = def.format(this.getUpgradeValue(id));
                    const btn = document.getElementById(`btn-up-${id}`);
                    if (level >= def.maxLevel) { document.getElementById(`cost-${id}`).innerText = "MAX"; btn.disabled = true; btn.innerText = "BUILT"; }
                    else { document.getElementById(`cost-${id}`).innerText = cost.toLocaleString(); btn.disabled = this.scrapCount < cost; }
                });

                const invList = document.getElementById('inventory-list'); invList.innerHTML = '';
                const sortedInv = [];
                Object.keys(this.inventory).forEach(itemName => {
                    let itemRarity = RARITIES.COMMON; let rarityKey = 'COMMON';
                    for (let key in RARITIES) { if (RARITIES[key].items.includes(itemName)) { itemRarity = RARITIES[key]; rarityKey = key; break; } }
                    sortedInv.push({ name: itemName, count: this.inventory[itemName], rarity: itemRarity, key: rarityKey });
                });

                sortedInv.sort((a, b) => {
                    const idxA = Object.keys(RARITIES).indexOf(a.key); const idxB = Object.keys(RARITIES).indexOf(b.key);
                    return idxA !== idxB ? idxA - idxB : a.name.localeCompare(b.name);
                });

                sortedInv.forEach(entry => {
                    const canCrush = entry.rarity.canCrush;
                    const displayYield = canCrush ? this.formatCrushYield(entry.rarity.crushYield) : '0';
                    invList.innerHTML += `
                        <div class="inv-item" style="border-left-color: ${entry.rarity.color}">
                            <div class="inv-item-info">
                                <span style="color: ${entry.rarity.color}; text-shadow: ${entry.rarity.shadow === 'none' ? '' : entry.rarity.shadow}">${entry.name}</span>
                                <span class="inv-item-count">x${entry.count.toLocaleString()}</span>
                            </div>
                            ${canCrush ? `<button class="btn-crush" data-item="${entry.name.replace(/"/g, '&quot;')}" data-rarity="${entry.key}" onclick="game.crushItem(this.getAttribute('data-item'), this.getAttribute('data-rarity'))">CRUSH (+${displayYield})</button>` : ''}
                        </div>
                    `;
                });
            }

            logEntry(itemName, rarity) {
                const log = document.getElementById('log-entries'); const entry = document.createElement('div'); entry.className = 'log-entry';
                const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
                entry.innerHTML = `<span style="color: var(--text-dim)">[${time}]</span> <span style="color: ${rarity.color}; text-shadow: ${rarity.shadow === 'none' ? '1px 1px 0 #000' : rarity.shadow}">${itemName}</span>`;
                if (['absolute', 'mythic', 'eldritch', 'unfathomable'].includes(rarity.id)) entry.classList.add('mythic-plus');
                log.prepend(entry);
                if (log.children.length > 30) log.removeChild(log.lastChild);
            }
        }

        const game = new AbyssalDredging();

    </script>
</body>
</html>
